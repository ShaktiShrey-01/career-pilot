<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080B14"/>
      <stop offset="100%" stop-color="#0D0B20"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <linearGradient id="heroGlow" x1="0%" y1="0%" x2="100%" y2="100%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </linearGradient>
    <!-- Puzzle piece path reusable via symbol -->
    <symbol id="piece" viewBox="-15 -15 130 130">
      <path d="M 20,0 L 42,0 C 42,-12 58,-12 58,0 L 100,0 L 100,42 C 112,42 112,58 100,58 L 100,100 L 58,100 C 58,112 42,112 42,100 L 0,100 L 0,58 C -12,58 -12,42 0,42 L 0,0 Z"/>
    </symbol>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>
  <ellipse cx="600" cy="270" rx="480" ry="240" fill="url(#heroGlow)"/>

  <!-- Floating background puzzle pieces -->
  <use href="#piece" x="-30" y="20" width="220" height="220" fill="none" stroke="#7C3AED" stroke-width="1" opacity="0.1"/>
  <use href="#piece" x="950" y="60" width="160" height="160" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.08"/>
  <use href="#piece" x="780" y="380" width="280" height="280" fill="none" stroke="#7C3AED" stroke-width="1" opacity="0.06"/>
  <use href="#piece" x="60" y="420" width="140" height="140" fill="none" stroke="#F59E0B" stroke-width="1" opacity="0.10"/>
  <use href="#piece" x="400" y="530" width="120" height="120" fill="none" stroke="#7C3AED" stroke-width="1" opacity="0.08"/>

  <!-- Hero Section — Puzzle piece icon -->
  <use href="#piece" x="566" y="80" width="68" height="68" fill="rgba(124,58,237,0.2)" stroke="#7C3AED" stroke-width="2"/>

  <!-- Hero label -->
  <text x="600" y="180" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="5" fill="#a78bfa" text-anchor="middle" opacity="0.9">PUZZLE ASSEMBLY — PORTFOLIO</text>

  <!-- Hero name (large gradient text simulation) -->
  <text x="600" y="255" font-family="Inter, system-ui, sans-serif" font-size="68" font-weight="800" fill="url(#purple)" text-anchor="middle" opacity="0.95">Alex Rivera</text>

  <!-- Title -->
  <text x="600" y="298" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="300" fill="#94A3B8" text-anchor="middle">Full Stack Developer &amp; Creative Technologist</text>

  <!-- Tagline -->
  <text x="600" y="328" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#475569" text-anchor="middle">Building the future, one line of code at a time.</text>

  <!-- CTA Buttons -->
  <rect x="456" y="350" width="130" height="38" rx="19" fill="#7C3AED"/>
  <text x="521" y="374" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">View Work</text>
  <rect x="598" y="350" width="110" height="38" rx="19" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="653" y="374" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#94A3B8" text-anchor="middle">Connect</text>
  <rect x="720" y="350" width="110" height="38" rx="19" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="775" y="374" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#94A3B8" text-anchor="middle">Contact</text>

  <!-- Stats row -->
  <text x="450" y="430" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700" fill="#a78bfa" text-anchor="middle">5+</text>
  <text x="450" y="448" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#475569" text-anchor="middle" letter-spacing="2">YEARS</text>
  <text x="600" y="430" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700" fill="#67e8f9" text-anchor="middle">48+</text>
  <text x="600" y="448" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#475569" text-anchor="middle" letter-spacing="2">PROJECTS</text>
  <text x="750" y="430" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700" fill="#fcd34d" text-anchor="middle">32+</text>
  <text x="750" y="448" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#475569" text-anchor="middle" letter-spacing="2">CLIENTS</text>

  <!-- Divider line -->
  <line x1="200" y1="490" x2="1000" y2="490" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Skills section preview — small puzzle tile grid -->
  <text x="100" y="530" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#67e8f9" letter-spacing="4">SKILLS</text>
  <text x="100" y="553" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#F1F5F9">Skills That Fit Together</text>

  <!-- Sample skill tiles -->
  <g opacity="0.7">
    <use href="#piece" x="100" y="575" width="60" height="60" fill="rgba(124,58,237,0.15)" stroke="rgba(124,58,237,0.5)" stroke-width="1.5"/>
    <text x="130" y="609" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="700" fill="#a78bfa" text-anchor="middle">React</text>
    <use href="#piece" x="168" y="575" width="60" height="60" fill="rgba(6,182,212,0.12)" stroke="rgba(6,182,212,0.5)" stroke-width="1.5"/>
    <text x="198" y="609" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="700" fill="#67e8f9" text-anchor="middle">Node.js</text>
    <use href="#piece" x="236" y="575" width="60" height="60" fill="rgba(124,58,237,0.15)" stroke="rgba(124,58,237,0.5)" stroke-width="1.5"/>
    <text x="266" y="609" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="700" fill="#a78bfa" text-anchor="middle">TypeScript</text>
    <use href="#piece" x="304" y="575" width="60" height="60" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.5)" stroke-width="1.5"/>
    <text x="334" y="609" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="700" fill="#fcd34d" text-anchor="middle">Docker</text>
    <use href="#piece" x="372" y="575" width="60" height="60" fill="rgba(236,72,153,0.1)" stroke="rgba(236,72,153,0.5)" stroke-width="1.5"/>
    <text x="402" y="609" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="700" fill="#f9a8d4" text-anchor="middle">Figma</text>
  </g>

  <!-- Project cards preview -->
  <rect x="660" y="500" width="160" height="130" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="660" y="500" width="160" height="60" rx="12" fill="rgba(124,58,237,0.15)"/>
  <rect x="660" y="548" width="160" height="12" rx="6" fill="rgba(255,255,255,0.05)"/>
  <text x="740" y="585" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#F1F5F9" text-anchor="middle">NeuralDash</text>
  <text x="740" y="600" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">AI Analytics Dashboard</text>

  <rect x="832" y="500" width="160" height="130" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="832" y="500" width="160" height="60" rx="12" fill="rgba(6,182,212,0.12)"/>
  <rect x="832" y="548" width="160" height="12" rx="6" fill="rgba(255,255,255,0.05)"/>
  <text x="912" y="585" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#F1F5F9" text-anchor="middle">PixelForge</text>
  <text x="912" y="600" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">Creative Browser Suite</text>

  <rect x="1004" y="500" width="160" height="130" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="1004" y="500" width="160" height="60" rx="12" fill="rgba(245,158,11,0.10)"/>
  <rect x="1004" y="548" width="160" height="12" rx="6" fill="rgba(255,255,255,0.05)"/>
  <text x="1084" y="585" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#F1F5F9" text-anchor="middle">EcoTrack</text>
  <text x="1084" y="600" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">Sustainability Platform</text>

  <!-- Bottom branding -->
  <text x="600" y="660" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1e293b" text-anchor="middle" letter-spacing="3">JIGSAW PUZZLE ASSEMBLY — PORTFOLIO TEMPLATE</text>
</svg>
